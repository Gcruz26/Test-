version: "3.9"

services:
  backend:
    build: ./backend
    container_name: alfa_backend
    env_file:
      - ./backend/.env
    environment:
      STORAGE_PROVIDER: local
      LOCAL_STORAGE_DIR: /workspace/uploads
    volumes:
      - ./backend:/app
      - ./uploads:/workspace/uploads
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: alfa_frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
    env_file:
      - ./frontend/.env
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
