version: "3.9"

services:
  db:
    image: postgres:16
    container_name: alfa_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: alfa_processing
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  backend:
    build: ./backend
    container_name: alfa_backend
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/alfa_processing
      SECRET_KEY: replace-with-a-real-secret
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      STORAGE_PROVIDER: local
      LOCAL_STORAGE_DIR: /workspace/uploads
    volumes:
      - ./backend:/app
      - ./uploads:/workspace/uploads
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    container_name: alfa_frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"

volumes:
  postgres_data:
